  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: #ffffff;
      font-family: 'Open Sans', sans-serif;
      color: #222;
    }

    /* HEADER */
    .header {
      background: #fff;
      padding: 24px 20px 16px;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid #e8edf5;
    }

    .logo-img {
      height: 130px;
      width: auto;
      object-fit: contain;
    }

    /* HERO TEXT */
    .hero {
      padding: 28px 20px 20px;
    }

    .hero h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1565c0;
      margin-bottom: 4px;
    }

    /* LOCATION SECTION */
    .location-section {
      padding: 0 20px 32px;
    }

    .location-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1565c0;
      margin-bottom: 12px;
    }

    .location-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }

    .team-photo {
      width: 100%;
      height: 260px;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    .book-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1565c0;
      color: #fff;
      padding: 18px 22px;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    .book-btn-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }

    .book-btn-arrow {
      font-size: 22px;
      opacity: 0.9;
    }

    .book-btn:active { background: #0d47a1; }

    /* Install Banner */
    #installBanner {
      display: none;
      background: #1565c0;
      color: #fff;
      padding: 12px 16px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }

    #installBanner button {
      background: #fff;
      color: #1565c0;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #installBanner .close-x {
      background: none;
      color: rgba(255,255,255,0.7);
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    /* FOOTER */
    footer {
      padding: 20px;
      text-align: center;
      border-top: 1px solid #e8edf5;
    }

    footer p {
      font-size: 12px;
      color: #999;
    }

    /* BOOKING OVERLAY */
    .booking-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1000;
      flex-direction: column;
    }
    .booking-overlay.active { display: flex; }

    .booking-topbar {
      background: #1565c0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    .booking-topbar-title {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .booking-iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e3eaf8;
      border-top-color: #1565c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text { font-size: 14px; color: #555; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* iOS safe area */
    .header { padding-top: max(24px, env(safe-area-inset-top)); }
  </style>
</head>
<body>

<!-- Install Banner -->
<div id="installBanner">
  <span>📱 App zum Startbildschirm hinzufügen</span>
  <button id="installBtn">Installieren</button>
  <button class="close-x" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mURL = URL.createObjectURL(mBlob);
  const mLink = document.createElement('link');
  mLink.rel = 'manifest';
  mLink.href = mURL;
  document.head.appendChild(mLink);

  // PWA Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    }
  });

  // Booking overlay
  function openBooking(url, title) {
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('bookingOverlay').classList.add('active');
    document.getElementById('loadingScreen').style.display = 'flex';
    const frame = document.getElementById('bookingFrame');
    frame.style.display = 'none';
    frame.src = url;
    frame.onload = () => {
      document.getElementById('loadingScreen').style.display = 'none';
      frame.style.display = 'block';
    };
    // Fallback falls iFrame geblockt
    setTimeout(() => {
      const ls = document.getElementById('loadingScreen');
      if (ls.style.display !== 'none') {
        ls.innerHTML = `
          <div style="text-align:center;padding:32px">
            <p style="font-size:16px;font-weight:600;color:#1565c0;margin-bottom:12px">Buchungsseite öffnen</p>
            <p style="font-size:13px;color:#666;margin-bottom:24px;line-height:1.6">Die Buchungsseite wird in Ihrem Browser geöffnet.</p>
            <a href="${url}" target="_blank" style="background:#1565c0;color:#fff;padding:14px 28px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600">Jetzt buchen →</a>
          </div>
        `;
        frame.style.display = 'none';
      }
    }, 4000);
    document.body.style.overflow = 'hidden';
  }

  function closeBooking() {
    document.getElementById('bookingOverlay').classList.remove('active');
    document.getElementById('bookingFrame').src = '';
    document.body.style.overflow = '';
  }
</script>
</body>
</html>
